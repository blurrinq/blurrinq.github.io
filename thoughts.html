<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>thoughts · blurrinq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000000; --text:#e8e8e8; --accent:#b00000;
      --muted:#555555; --link:#b00000; --border:#1a1a1a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { background:var(--bg); color:var(--text); font-family:'Courier Prime',monospace; font-size:15px; line-height:1.75; }
    body { max-width:600px; margin:0 auto; padding:60px 24px 100px; }
    body > * { opacity:0; transform:translateY(10px); transition:opacity 0.5s ease, transform 0.5s ease; }
    body.loaded > * { opacity:1; transform:translateY(0); }
    body.loaded > *:nth-child(1) { transition-delay:0.05s; }
    body.loaded > *:nth-child(2) { transition-delay:0.12s; }
    body.loaded > *:nth-child(3) { transition-delay:0.19s; }
    .back { display:inline-block; color:var(--accent); text-decoration:none; margin-bottom:32px; font-size:0.9rem; border-bottom:1px solid transparent; transition:border-color 0.2s; }
    .back:hover { border-bottom-color:var(--accent); }
    h1 { font-family:'IM Fell English',serif; font-size:2rem; font-weight:normal; color:var(--accent); margin-bottom:32px; }
    .post { border-bottom:1px solid var(--border); padding:18px 0; }
    .post:last-child { border-bottom:none; }
    .post-date { color:var(--muted); font-size:0.8rem; margin-bottom:4px; }
    .post-title { font-family:'IM Fell English',serif; font-size:1.2rem; }
    .post-title a { color:var(--muted); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.2s, color 0.2s; }
    .post-title a:hover { border-bottom-color:var(--link); color:var(--link); }
    .empty { color:var(--muted); font-style:italic; margin-top:24px; }
    ::selection { background:#8b0000; color:#fff; }
    .cursor { position:fixed; width:6px; height:6px; background:var(--accent); border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); transition:transform 0.08s ease, opacity 0.3s; z-index:9999; opacity:0; }
    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:9998; }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <a class="back" href="index.html">← back</a>
  <h1>blurrinq's thoughts</h1>
  <div class="post">
    <div class="post-date">2025 — I</div>
    <div class="post-title"><a href="disappear.html">how to disappear</a></div>
  </div>
  <div class="post">
    <div class="post-date">2025 — II</div>
    <div class="post-title"><a href="walls.html">what's in the walls</a></div>
  </div>
  <div class="post">
    <div class="post-date">2025 — III</div>
    <div class="post-title"><a href="watching.html">why they're watching</a></div>
  </div>
  <script>
    window.addEventListener('load', () => document.body.classList.add('loaded'));
    const cursor = document.getElementById('cursor');
    let mx=0,my=0,cx=0,cy=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.opacity='1'; });
    document.addEventListener('mouseleave', () => cursor.style.opacity='0');
    function loop(){ cx+=(mx-cx)*0.18; cy+=(my-cy)*0.18; cursor.style.left=cx+'px'; cursor.style.top=cy+'px'; requestAnimationFrame(loop); }
    loop();
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.style.transform='translate(-50%,-50%) scale(2.5)');
      a.addEventListener('mouseleave', () => cursor.style.transform='translate(-50%,-50%) scale(1)');
    });
  </script>
</body>
</html>
