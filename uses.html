<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>uses · blurrinq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000000; --text:#e8e8e8; --accent:#8b0000;
      --accent-bright:#b00000; --muted:#555555; --link:#b00000; --border:#1a1a1a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { background:var(--bg); color:var(--text); font-family:'Courier Prime',monospace; font-size:15px; line-height:1.75; }
    body { max-width:600px; margin:0 auto; padding:60px 24px 100px; }

    body > * { opacity:0; transform:translateY(10px); transition:opacity 0.5s ease, transform 0.5s ease; }
    body.loaded > * { opacity:1; transform:translateY(0); }
    body.loaded > *:nth-child(1) { transition-delay:0.05s; }
    body.loaded > *:nth-child(2) { transition-delay:0.10s; }
    body.loaded > *:nth-child(3) { transition-delay:0.17s; }
    body.loaded > *:nth-child(4) { transition-delay:0.24s; }
    body.loaded > *:nth-child(5) { transition-delay:0.31s; }
    body.loaded > *:nth-child(6) { transition-delay:0.38s; }
    body.loaded > *:nth-child(7) { transition-delay:0.45s; }
    body.loaded > *:nth-child(8) { transition-delay:0.52s; }

    .back { display:inline-block; color:var(--accent-bright); text-decoration:none; margin-bottom:36px; font-size:0.9rem; border-bottom:1px solid transparent; transition:border-color 0.2s; }
    .back:hover { border-bottom-color:var(--accent-bright); }

    h1 { font-family:'IM Fell English',serif; font-size:2rem; font-weight:normal; color:var(--accent-bright); margin-bottom:6px; }
    .subtitle { color:var(--muted); font-size:0.85rem; font-style:italic; margin-bottom:40px; }

    .section { margin-top:36px; }
    .section-title {
      font-family:'IM Fell English',serif; font-size:0.82rem;
      letter-spacing:0.09em; color:var(--muted);
      border-bottom:1px solid var(--border); padding-bottom:4px; margin-bottom:14px;
    }

    .item { padding:8px 0; border-bottom:1px solid var(--border); }
    .item:last-child { border-bottom:none; }
    .item-name { color:var(--text); font-size:0.95rem; }
    .item-name span {
      color:var(--accent-bright);
      margin-right:6px;
      font-size:0.8rem;
      letter-spacing:0.05em;
    }
    .item-desc { color:var(--muted); font-size:0.83rem; margin-top:1px; padding-left:22px; }

    a { color:var(--link); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.15s, color 0.15s; }
    a:hover { border-bottom-color:var(--link); color:#cc2020; }

    .cursor { position:fixed; width:6px; height:6px; background:var(--accent-bright); border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); transition:transform 0.08s ease, opacity 0.3s; z-index:9999; opacity:0; }

    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:9998; }

    ::selection { background:var(--accent); color:#fff; }
    @media (max-width:480px) { body { padding:40px 18px 80px; } h1 { font-size:1.7rem; } }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>

  <a class="back" href="index.html">← back</a>

  <h1>uses</h1>
  <p class="subtitle">my setup, tools, and stack. updated occasionally.</p>

  <div class="section">
    <div class="section-title">hardware</div>
    <div class="item">
      <div class="item-name"><span>PC</span> <!-- e.g. Custom build / MacBook Pro M3 --></div>
      <div class="item-desc"><!-- e.g. Ryzen 7, RTX 4070, 32GB RAM --></div>
    </div>
    <div class="item">
      <div class="item-name"><span>phone</span> <!-- e.g. iPhone 15 / Pixel 8 --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>peripherals</span> <!-- keyboard, mouse, headset --></div>
      <div class="item-desc"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">os &amp; software</div>
    <div class="item">
      <div class="item-name"><span>OS</span> <!-- e.g. Arch Linux / Windows 11 --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>editor</span> <!-- e.g. Neovim / VS Code --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>terminal</span> <!-- e.g. Alacritty / Wezterm --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>browser</span> <!-- e.g. Firefox with uBlock / Brave --></div>
      <div class="item-desc"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">privacy stack</div>
    <div class="item">
      <div class="item-name"><span>VPN</span> <!-- e.g. Mullvad / Proton --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>DNS</span> <!-- e.g. NextDNS / Pi-hole --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>email</span> <!-- e.g. ProtonMail / Tuta --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>passwords</span> <!-- e.g. Bitwarden / KeePassXC --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>2FA</span> <!-- e.g. Aegis / Ente Auth --></div>
      <div class="item-desc"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">gaming</div>
    <div class="item">
      <div class="item-name"><span>currently playing</span> <!-- update this often --></div>
      <div class="item-desc"></div>
    </div>
    <div class="item">
      <div class="item-name"><span>platform</span> <!-- PC / PS5 / Switch --></div>
      <div class="item-desc"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">medicine / learning</div>
    <div class="item">
      <div class="item-name"><span>currently reading</span></div>
      <div class="item-desc"><!-- book, paper, or resource --></div>
    </div>
    <div class="item">
      <div class="item-name"><span>resources</span></div>
      <div class="item-desc"><!-- Anki, Osmosis, Amboss, etc. --></div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => document.body.classList.add('loaded'));
    const cursor = document.getElementById('cursor');
    let mx=0,my=0,cx=0,cy=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.opacity='1'; });
    document.addEventListener('mouseleave', () => cursor.style.opacity='0');
    function loop(){ cx+=(mx-cx)*0.18; cy+=(my-cy)*0.18; cursor.style.left=cx+'px'; cursor.style.top=cy+'px'; requestAnimationFrame(loop); }
    loop();
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.style.transform='translate(-50%,-50%) scale(2.5)');
      a.addEventListener('mouseleave', () => cursor.style.transform='translate(-50%,-50%) scale(1)');
    });
  </script>
</body>
</html>
