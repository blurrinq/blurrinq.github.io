<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blurrinq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000000; --text:#e8e8e8; --accent:#8b0000;
      --accent-bright:#b00000; --muted:#484848; --link:#b00000; --border:#181818;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { background:var(--bg); color:var(--text); font-family:'Courier Prime',monospace; font-size:15px; line-height:1.75; }
    body { max-width:600px; margin:0 auto; padding:60px 24px 80px 48px; position:relative; }

    /* red margin rule */
    body::before {
      content:''; position:fixed; left:calc(50% - 318px); top:0; bottom:0; width:1px;
      background:linear-gradient(to bottom,transparent 0%,var(--accent) 15%,var(--accent) 85%,transparent 100%);
      opacity:0.3; pointer-events:none;
    }
    /* scanline */
    body::after {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
      pointer-events:none; z-index:9998;
    }

    /* staggered entrance */
    body > * { opacity:0; transform:translateY(12px); transition:opacity 0.55s ease,transform 0.55s ease; }
    body.loaded > * { opacity:1; transform:translateY(0); }
    body.loaded > *:nth-child(1){transition-delay:0.05s}
    body.loaded > *:nth-child(2){transition-delay:0.13s}
    body.loaded > *:nth-child(3){transition-delay:0.21s}
    body.loaded > *:nth-child(4){transition-delay:0.29s}
    body.loaded > *:nth-child(5){transition-delay:0.37s}
    body.loaded > *:nth-child(6){transition-delay:0.45s}
    body.loaded > *:nth-child(7){transition-delay:0.53s}
    body.loaded > *:nth-child(8){transition-delay:0.61s}

    /* logo */
    .logo-wrap { display:block; width:110px; margin:0 0 28px 0; border-radius:16px; overflow:hidden; box-shadow:0 0 10px 1px rgba(155,0,0,0.28); transition:box-shadow 0.4s; }
    .logo-wrap:hover { box-shadow:0 0 22px 4px rgba(185,0,0,0.5); }
    .logo-wrap img { display:block; width:100%; height:auto; }

    /* heading */
    h1 { font-family:'IM Fell English',serif; font-size:2.2rem; font-weight:normal; letter-spacing:-0.02em; margin-bottom:24px; color:var(--accent-bright); display:inline-block; cursor:default; }
    h1::after { content:'_'; color:var(--accent-bright); animation:blink 1.1s step-end infinite; margin-left:1px; font-size:1.8rem; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    h1:hover { animation:glitch 0.4s linear; }
    @keyframes glitch {
      0%  {text-shadow:none;transform:translate(0)}
      10% {text-shadow:-2px 0 var(--accent);transform:translate(2px,0)}
      20% {text-shadow:2px 0 #330000;transform:translate(-2px,0)}
      30% {text-shadow:-1px 0 var(--accent);transform:translate(1px,0)}
      40% {text-shadow:1px 0 #550000;transform:translate(0)}
      50% {text-shadow:-2px 0 var(--accent);transform:translate(-1px,0)}
      60% {text-shadow:2px 0 #330000;transform:translate(2px,0)}
      70% {text-shadow:none;transform:translate(0)}
      100%{text-shadow:none;transform:translate(0)}
    }

    /* bio */
    .bio { margin-bottom:8px; }
    .bio p { margin-bottom:5px; }
    .bio blockquote { border-left:2px solid var(--accent); padding-left:12px; color:var(--muted); font-style:italic; margin:14px 0; min-height:1.75em; }
    #typed-caret { display:inline-block; width:1px; height:0.85em; background:var(--accent); margin-left:2px; vertical-align:middle; animation:blink 0.8s step-end infinite; }
    .badges { color:var(--accent-bright); font-size:1.05rem; margin-right:3px; }
    .interests { color:var(--muted); font-size:0.88rem; font-style:italic; margin-top:10px; }
    .status { margin-top:14px; font-size:0.82rem; color:var(--muted); }
    .status .label { color:var(--accent-bright); margin-right:4px; }

    /* sections */
    .section { margin-top:34px; }
    .section-title { font-family:'IM Fell English',serif; font-size:0.82rem; letter-spacing:0.09em; color:var(--muted); padding-bottom:4px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .section-title::after { content:'· · ·'; color:var(--accent); opacity:0.45; font-size:0.72rem; letter-spacing:0.18em; flex:1; }

    ul { list-style:none; }
    ul li { padding:2px 0; }
    ul li::before { content:'+ '; color:var(--accent-bright); }

    a { color:var(--link); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.15s,color 0.15s; }
    a:hover { border-bottom-color:var(--link); color:#cc2020; }

    /* bottom logo */
    .logo-wrap-sm { display:block; width:50px; margin:50px 0 0 0; border-radius:10px; overflow:hidden; opacity:0.45; box-shadow:0 0 7px 1px rgba(140,0,0,0.2); transition:box-shadow 0.4s,opacity 0.4s; }
    .logo-wrap-sm:hover { opacity:1; box-shadow:0 0 18px 4px rgba(185,0,0,0.5); }
    .logo-wrap-sm img { display:block; width:100%; height:auto; }

    .last-updated { margin-top:20px; font-size:0.72rem; color:#272727; letter-spacing:0.04em; }

    /* cursor dot */
    .cursor { position:fixed; width:6px; height:6px; background:var(--accent-bright); border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); transition:transform 0.08s ease,opacity 0.3s; z-index:9999; opacity:0; }

    ::selection { background:var(--accent); color:#fff; }
    @media(max-width:540px){ body{padding:40px 18px 60px 32px} body::before{left:10px} h1{font-size:1.8rem} }
  </style>
</head>

  <p class="last-updated" id="last-updated"></p>

  <script>
    window.addEventListener('load', () => document.body.classList.add('loaded'));

    const quote = "do so much work that it would be illogical not to succeed.";
    const el = document.getElementById('typed-quote');
    const caret = document.getElementById('typed-caret');
    let i = 0;
    function type() {
      if (i < quote.length) {
        el.textContent += quote[i++];
        setTimeout(type, 36 + Math.random() * 24);
      } else {
        setTimeout(() => { caret.style.animation='none'; caret.style.opacity='0'; }, 1400);
      }
    }
    setTimeout(type, 950);

    document.getElementById('last-updated').textContent =
      'last updated ' + new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});

    const cursor = document.getElementById('cursor');
    let mx=0,my=0,cx=0,cy=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.opacity='1'; });
    document.addEventListener('mouseleave', () => cursor.style.opacity='0');
    (function loop(){ cx+=(mx-cx)*0.18; cy+=(my-cy)*0.18; cursor.style.left=cx+'px'; cursor.style.top=cy+'px'; requestAnimationFrame(loop); })();
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => cursor.style.transform='translate(-50%,-50%) scale(2.5)');
      a.addEventListener('mouseleave', () => cursor.style.transform='translate(-50%,-50%) scale(1)');
    });
  </script>
